name: Daily Content Ideas

on:
  schedule:
    - cron: '0 3 * * *'   # 7am UAE (UTC+4) = 3am UTC
  workflow_dispatch:

jobs:
  generate-ideas:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate ideas and content packs
        env:
          NEWSAPI_KEY:       ${{ secrets.NEWSAPI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m scripts.content.run_daily_ideas

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/content_ideas.json
          git diff --staged --quiet || git commit -m "chore: daily content ideas [skip ci]"
          git push
