name: AARZOU Daily Monitor

on:
  schedule:
    # 03:00 UTC = 07:00 UAE time (UTC+4)
    - cron: "0 3 * * *"
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Amazon monitor
        continue-on-error: true
        env:
          AMAZON_CLIENT_ID:      ${{ secrets.AMAZON_CLIENT_ID }}
          AMAZON_CLIENT_SECRET:  ${{ secrets.AMAZON_CLIENT_SECRET }}
          AMAZON_REFRESH_TOKEN:  ${{ secrets.AMAZON_REFRESH_TOKEN }}
          GMAIL_ADDRESS:         ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -m scripts.amazon_monitor

      - name: Run Noon monitor
        continue-on-error: true
        env:
          NOON_CREDENTIALS_JSON: ${{ secrets.NOON_CREDENTIALS_JSON }}
          GMAIL_ADDRESS:         ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -m scripts.noon_monitor
