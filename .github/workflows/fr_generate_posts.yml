name: F&R — Generate Daily X Post

on:
  schedule:
    # 12:00 UAE = 08:00 UTC  (noon UAE — good morning engagement)
    - cron: "0 8 * * *"
    # 16:00 UAE = 12:00 UTC  (4pm UAE = noon EST — peak X window)
    - cron: "0 12 * * *"
    # 22:00 UAE = 18:00 UTC  (10pm UAE = 6pm EST — evening peak)
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      post_type:
        description: "Post type (leave blank for auto)"
        required: false
        default: ""

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install anthropic requests python-dotenv tweepy

      - name: Generate post and send to Telegram
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          YOUR_TELEGRAM_CHAT_ID: ${{ secrets.YOUR_TELEGRAM_CHAT_ID }}
          TYPEFULLY_API_KEY:     ${{ secrets.TYPEFULLY_API_KEY }}
        run: |
          cd automation
          POST_TYPE="${{ github.event.inputs.post_type }}"
          if [ -n "$POST_TYPE" ]; then
            python fortune_ruin/scripts/generate_daily_post.py "$POST_TYPE"
          else
            python fortune_ruin/scripts/generate_daily_post.py
          fi
