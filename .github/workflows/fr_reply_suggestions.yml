name: F&R — Daily Reply Suggestions

on:
  schedule:
    # 08:00 UAE = 04:00 UTC — arrives before the day starts
    - cron: "0 4 * * *"
  workflow_dispatch: {}

jobs:
  suggest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-generativeai requests python-dotenv

      - name: Generate reply suggestions
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.YOUR_TELEGRAM_CHAT_ID }}
        run: |
          python fortune_ruin/scripts/generate_reply_suggestions.py

      - name: Commit cooldown file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fortune_ruin/.recent_reply_authors.json
          git diff --cached --quiet || git commit -m "chore: update F&R reply author cooldown [skip ci]"
          git push
